<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priconnecte | Безопасность</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="passwords-page" style="background: var(--secondary-gradient);">

    <div class="passwords-container" style="max-width: 800px; margin: 0 auto; padding: 20px;">
        
        <header class="passwords-header" style="display: flex; align-items: center; justify-content: space-between; padding: 20px 0; margin-bottom: 20px; border-bottom: 1px solid var(--border-color);">
            <button class="icon-btn" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 style="font-weight: 600; color: var(--text-primary);">Безопасность</h1>
            <div style="width: 40px"></div>
        </header>

        <div class="passwords-content" style="display: flex; flex-direction: column; gap: 24px;">
            
            <!-- Локальный пароль -->
            <section class="security-section" style="background: var(--bg-secondary); border-radius: var(--border-radius); padding: 24px; display: flex; align-items: center; gap: 20px; border: 1px solid var(--border-color);">
                <div class="section-icon-gradient blue" style="width: 56px; height: 56px; background: var(--accent-gradient); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px;">
                    <i class="fas fa-key"></i>
                </div>
                <div class="section-info" style="flex: 1;">
                    <h2 style="font-weight: 600; color: var(--text-primary); font-size: 16px; margin-bottom: 6px;">Локальный пароль</h2>
                    <p style="color: var(--text-hint); font-size: 13px;">Защитите приложение паролем</p>
                </div>
                <button class="btn-primary-gradient" id="local-pass-btn" onclick="toggleLocalPassword()">
                    <i class="fas fa-plus"></i> Включить
                </button>
            </section>

            <div class="security-form hidden" id="local-password-form" style="background: var(--bg-secondary); border-radius: var(--border-radius); padding: 24px; border: 1px solid var(--border-color);">
                <h3 style="font-weight: 600; color: var(--text-primary); margin-bottom: 20px;"><i class="fas fa-lock" style="color: #3390ec;"></i> Настройка пароля</h3>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="local-password" class="input-field-gradient" placeholder="Минимум 4 символа">
                </div>
                <div class="input-group">
                    <label>Подтвердите пароль</label>
                    <input type="password" id="local-password-confirm" class="input-field-gradient" placeholder="Повторите пароль">
                </div>
                <div class="form-actions">
                    <button class="btn-secondary-gradient" onclick="cancelLocalPassword()">Отмена</button>
                    <button class="btn-primary-gradient" onclick="saveLocalPassword()">Сохранить</button>
                </div>
            </div>

            <!-- Активные сеансы -->
            <section class="security-section" style="background: var(--bg-secondary); border-radius: var(--border-radius); padding: 24px; display: flex; align-items: center; gap: 20px; border: 1px solid var(--border-color);">
                <div class="section-icon-gradient green" style="width: 56px; height: 56px; background: var(--success-gradient); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px;">
                    <i class="fas fa-desktop"></i>
                </div>
                <div class="section-info" style="flex: 1;">
                    <h2 style="font-weight: 600; color: var(--text-primary); font-size: 16px; margin-bottom: 6px;">Активные сеансы</h2>
                    <p style="color: var(--text-hint); font-size: 13px;">Устройства где открыт Priconnecte</p>
                </div>
            </section>

            <div class="sessions-list" id="sessions-list" style="background: var(--bg-secondary); border-radius: var(--border-radius); padding: 16px; border: 1px solid var(--border-color);">
                <div class="session-item current" style="display: flex; align-items: center; gap: 16px; padding: 16px; border-bottom: 1px solid var(--border-color); background: rgba(51, 144, 236, 0.1);">
                    <div class="session-icon" style="width: 48px; height: 48px; background: var(--bg-tertiary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-hint); font-size: 20px;">
                        <i class="fas fa-desktop"></i>
                    </div>
                    <div class="session-info" style="flex: 1;">
                        <h4 style="font-weight: 600; color: var(--text-primary); margin-bottom: 4px;">Текущий браузер</h4>
                        <p style="color: var(--text-hint); font-size: 13px;">Сейчас</p>
                    </div>
                    <span class="session-badge" style="background: var(--success-gradient); color: white; font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px;">Текущий</span>
                </div>
            </div>

            <button class="btn-secondary-gradient full-width" onclick="terminateAllSessions()">
                <i class="fas fa-sign-out-alt"></i> Завершить все сеансы
            </button>

            <!-- Данные -->
            <section class="security-section" style="background: var(--bg-secondary); border-radius: var(--border-radius); padding: 24px; display: flex; align-items: center; gap: 20px; border: 1px solid var(--border-color);">
                <div class="section-icon-gradient blue" style="width: 56px; height: 56px; background: var(--accent-gradient); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px;">
                    <i class="fas fa-database"></i>
                </div>
                <div class="section-info" style="flex: 1;">
                    <h2 style="font-weight: 600; color: var(--text-primary); font-size: 16px; margin-bottom: 6px;">Данные</h2>
                    <p style="color: var(--text-hint); font-size: 13px;">Управление локальными данными</p>
                </div>
            </section>

            <div class="data-settings" style="background: var(--bg-secondary); border-radius: var(--border-radius); padding: 16px; border: 1px solid var(--border-color);">
                <button class="btn-secondary-gradient full-width" onclick="exportData()">
                    <i class="fas fa-download"></i> Экспортировать данные
                </button>
                <button class="btn-danger-gradient full-width" style="margin-top: 12px;" onclick="confirmClearData()">
                    <i class="fas fa-trash"></i> Очистить все данные
                </button>
            </div>

            <!-- О приложении -->
            <section class="security-section" style="background: var(--bg-secondary); border-radius: var(--border-radius); padding: 24px; display: flex; align-items: center; gap: 20px; border: 1px solid var(--border-color);">
                <div class="section-icon-gradient purple" style="width: 56px; height: 56px; background: linear-gradient(135deg, #9c27b0, #673ab7); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px;">
                    <i class="fas fa-info-circle"></i>
                </div>
                <div class="section-info" style="flex: 1;">
                    <h2 style="font-weight: 600; color: var(--text-primary); font-size: 16px; margin-bottom: 6px;">О приложении</h2>
                    <p style="color: var(--text-hint); font-size: 13px;">Версия и информация</p>
                </div>
            </section>

            <div class="app-info" style="background: var(--bg-secondary); border-radius: var(--border-radius); padding: 24px; border: 1px solid var(--border-color);">
                <div class="info-row" style="display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border-color);">
                    <span style="color: var(--text-secondary);">Версия</span>
                    <span style="color: #3390ec; font-weight: 600;">1.0.0</span>
                </div>
                <div class="info-row" style="display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border-color);">
                    <span style="color: var(--text-secondary);">Сборка</span>
                    <span style="color: #3390ec; font-weight: 600;">2024.01</span>
                </div>
                <div class="info-row" style="display: flex; justify-content: space-between; padding: 12px 0;">
                    <span style="color: var(--text-secondary);">Режим</span>
                    <span style="color: #3390ec; font-weight: 600;">Без регистрации</span>
                </div>
            </div>

        </div>
    </div>

    <div id="notification-container"></div>
    <script src="script.js"></script>
</body>
</html>
