<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priconnecte Messenger</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <!-- ЭКРАН ВХОДА -->
    <div id="login-screen">
        <div class="login-box">
            <div class="login-logo">Priconnecte</div>
            <p class="login-subtitle">Быстро. Безопасно. Надежно.</p>
            <input type="text" id="username-input" class="login-input" placeholder="Введите ваше имя">
            <button class="login-btn" onclick="login()">Войти в аккаунт</button>
        </div>
    </div>

    <!-- ГЛАВНОЕ ПРИЛОЖЕНИЕ -->
    <div id="main-app" class="hidden">
        
        <!-- Сайдбар -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="menu-btn" onclick="toggleProfile()"><i class="fas fa-bars"></i></div>
                <input type="text" class="search-bar" placeholder="Поиск">
            </div>
            <div class="chat-list">
                <div class="chat-item active">
                    <div class="avatar">G</div>
                    <div class="chat-info">
                        <div class="chat-name">General Chat</div>
                        <div class="chat-preview">Добро пожаловать в Priconnecte!</div>
                    </div>
                    <div class="chat-meta">Сейчас</div>
                </div>
            </div>
        </div>

        <!-- Область чата -->
        <div class="chat-area">
            <div class="chat-header">
                <div>
                    <div class="chat-name" id="chat-title">General Chat</div>
                    <div class="chat-meta" id="chat-status">онлайн</div>
                </div>
                <div class="menu-btn"><i class="fas fa-search"></i></div>
            </div>

            <div class="messages-container" id="messages-box">
                <!-- Сообщения будут появляться здесь -->
            </div>

            <div class="input-area">
                <div class="attach-btn"><i class="fas fa-paperclip"></i></div>
                <input type="text" class="message-input" id="message-input" placeholder="Написать сообщение..." onkeypress="handleEnter(event)">
                <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- ПРОФИЛЬ -->
    <div class="profile-modal" id="profile-modal">
        <div class="profile-panel">
            <div class="profile-header">
                <div class="profile-big-avatar" id="profile-avatar-display">U</div>
                <div>
                    <div class="profile-name" id="profile-name-display">User</div>
                    <div class="profile-status">в сети</div>
                </div>
                <div style="margin-left: auto; cursor: pointer;" onclick="toggleProfile()"><i class="fas fa-times"></i></div>
            </div>

            <div class="profile-section">
                <div class="profile-row"><span><i class="fas fa-user-edit"></i> Изменить профиль</span><i class="fas fa-chevron-right"></i></div>
                <div class="profile-row"><span><i class="fas fa-palette"></i> Тема оформления</span><i class="fas fa-chevron-right"></i></div>
                <div class="profile-row"><span><i class="fas fa-lock"></i> Конфиденциальность</span><i class="fas fa-chevron-right"></i></div>
                <div class="profile-row"><span><i class="fas fa-robot"></i> AI Ассистент</span><i class="fas fa-chevron-right"></i></div>
            </div>
            
            <div class="profile-section">
                 <div class="profile-row" onclick="toggleTheme()">
                    <span><i class="fas fa-moon"></i> Темная тема</span>
                    <input type="checkbox" id="theme-toggle">
                </div>
            </div>

            <div class="logout-btn" onclick="logout()">Выйти из аккаунта</div>
        </div>
    </div>

    <!-- Подключаем Socket.io (Клиентская часть) -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
